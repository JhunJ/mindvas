<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Mindvas canvas harness</title>
		<style>
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				padding: 0;
				height: 100%;
				overflow: hidden;
				font-family: sans-serif;
				background: #1e1e1e;
			}
			#canvas-wrapper {
				position: relative;
				width: 100%;
				height: 100%;
				touch-action: none;
			}
			.canvas-node {
				position: absolute;
				border: 1px solid #4a4a4a;
				border-radius: 6px;
				background: #2a2a2a;
				color: #ddd;
				touch-action: none;
			}
			.canvas-node-content {
				position: relative;
				width: 100%;
				height: 100%;
				padding: 10px;
			}
			.mindvas-mask-tape {
				position: absolute;
				inset: 0;
				z-index: 9999;
				border-radius: 6px;
				background: rgba(120, 170, 255, 0.93);
				/* Whole-card masks never catch touches. */
				pointer-events: none;
				display: flex;
				align-items: flex-end;
				justify-content: center;
				font-size: 11px;
				color: #152a5a;
			}
		</style>
	</head>
	<body>
		<div id="canvas-wrapper"></div>
		<script src="harness.js"></script>
	</body>
</html>
